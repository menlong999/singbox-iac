version: 1

subscription:
  url: "https://example.com/subscription"
  format: "base64-lines"
  protocols:
    - trojan

output:
  stagingPath: "~/.config/singbox-iac/generated/config.staging.json"
  livePath: "~/.config/sing-box/config.json"
  backupPath: "~/.config/singbox-iac/generated/config.last-known-good.json"

runtime:
  checkCommand: "sing-box check -c {{stagingPath}}"
  reload:
    kind: "signal"
    processName: "sing-box"
    signal: "HUP"
  desktop:
    profile: "system-proxy"
    launchAgentLabel: "org.singbox-iac.runtime"
    tun:
      autoRoute: true
      strictRoute: false
      addresses:
        - "172.19.0.1/30"
        - "fdfe:dcba:9876::1/126"

listeners:
  mixed:
    enabled: true
    listen: "127.0.0.1"
    port: 39097
  proxifier:
    enabled: true
    listen: "127.0.0.1"
    port: 39091

